<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="src/style.css">
    <title>Ejercicio 2</title>
</head>
<body>
    <div class="space-y-4 p-6 max-w-md">
        <div>
            <label class="block text-sm font-medium text-slate-700 mb-1">Email (habilitado)</label>
            <input 
            type="email" 
            placeholder="example@email.com" 
            class="w-full rounded-md border border-slate-300 px-3 py-2 text-slate-900
            focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500
            invalid:border-red-500 invalid:text-red-600 invalid:focus:ring-red-500
            transition duration-100">
        </div>
        <div>
            <label class="block text-sm font-medium text-slate-700 mb-1">Email (deshabilitado)</label>
            <input 
            type="email" 
            disabled
            placeholder="example@email.com" 
            class="w-full rounded-md border border-slate-300 px-3 py-2 text-slate-900
            focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500
            invalid:border-red-500 invalid:text-red-600 invalid:focus:ring-red-500
            disabled:bg-slate-100 disabled:text-slate-400 disabled:cursor-not-allowed
            transition duration-100">
        </div>
    </div>
</body>
</html>
